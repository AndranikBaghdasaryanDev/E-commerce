openapi: 3.0.1
info:
  title: E-commerce API
  description: A professional e-commerce backend API built with Node.js, Express, and MongoDB
  version: 1.0.0
  contact:
    name: API Support
    email: support@codixa.am
servers:
  - url: http://localhost:3000
    description: Development server

paths:
  /:
    get:
      summary: Health check
      description: Check if the API is running
      tags:
        - Health
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "E-commerce API is running"
                  version:
                    type: string
                    example: "1.0.0"
                  documentation:
                    type: string
                    example: "/api-docs"

  /api/auth/register:
    post:
      summary: Register a new user
      description: Create a new user account
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  minLength: 6
                  example: "password123"
                role:
                  type: string
                  enum: [admin, user]
                  default: user
                  example: "user"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User registered successfully."
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/User'

  /api/auth/login:
    post:
      summary: Login user
      description: Authenticate user and return JWT token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  example: "password123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful."
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/User'

  /api/products:
    get:
      summary: Get all products
      description: Retrieve products with pagination
      tags:
        - Products
      parameters:
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Number of products per page
          required: false
          schema:
            type: integer
            default: 8
            minimum: 1
            maximum: 100
        - name: category
          in: query
          description: Filter by category slug
          required: false
          schema:
            type: string
            example: "laptops"
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  total:
                    type: integer
                    example: 100
                  page:
                    type: integer
                    example: 1
                  totalPages:
                    type: integer
                    example: 13
                  hasNext:
                    type: boolean
                    example: true
                  hasPrev:
                    type: boolean
                    example: false

    post:
      summary: Create product
      description: Create a new product (admin only)
      tags:
        - Products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Product created successfully."
                  product:
                    $ref: '#/components/schemas/Product'

  /api/products/{id}:
    get:
      summary: Get product by ID
      description: Retrieve a specific product
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
      responses:
        '200':
          description: Product retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

    put:
      summary: Update product
      description: Update product information (admin only)
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
      responses:
        '200':
          description: Product updated successfully

    delete:
      summary: Delete product
      description: Delete a product (admin only)
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
      responses:
        '200':
          description: Product deleted successfully

  /api/categories:
    get:
      summary: Get all categories
      description: Retrieve all product categories
      tags:
        - Categories
      responses:
        '200':
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

    post:
      summary: Create category
      description: Create a new category (admin only)
      tags:
        - Categories
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "Electronics"
      responses:
        '201':
          description: Category created successfully

  /api/categories/{id}:
    get:
      summary: Get category by ID
      description: Retrieve a specific category
      tags:
        - Categories
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID
          schema:
            type: string
      responses:
        '200':
          description: Category retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'

    put:
      summary: Update category
      description: Update category information (admin only)
      tags:
        - Categories
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "Updated Category"
      responses:
        '200':
          description: Category updated successfully

    delete:
      summary: Delete category
      description: Delete a category (admin only)
      tags:
        - Categories
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID
          schema:
            type: string
      responses:
        '200':
          description: Category deleted successfully

  /api/cart:
    get:
      summary: Get user cart
      description: Retrieve authenticated user's shopping cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'

    post:
      summary: Add item to cart
      description: Add a product to user's cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - quantity
              properties:
                productId:
                  type: string
                  example: "60d5ecb74b24a1234567890a"
                quantity:
                  type: integer
                  minimum: 1
                  example: 2
      responses:
        '200':
          description: Item added to cart successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Product added to cart successfully."
                  cart:
                    $ref: '#/components/schemas/Cart'

    put:
      summary: Update cart item
      description: Update quantity of an item in cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - quantity
              properties:
                productId:
                  type: string
                  example: "60d5ecb74b24a1234567890a"
                quantity:
                  type: integer
                  minimum: 1
                  example: 3
      responses:
        '200':
          description: Cart item updated successfully

    delete:
      summary: Clear cart
      description: Remove all items from user's cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart cleared successfully

  /api/cart/{productId}:
    delete:
      summary: Remove item from cart
      description: Remove a specific item from user's cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          description: Product ID to remove
          schema:
            type: string
      responses:
        '200':
          description: Item removed from cart successfully

  /api/orders:
    get:
      summary: Get user orders
      description: Retrieve authenticated user's orders with pagination
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Number of orders per page
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  total:
                    type: integer
                  page:
                    type: integer
                  totalPages:
                    type: integer
                  hasNext:
                    type: boolean
                  hasPrev:
                    type: boolean

    post:
      summary: Create order
      description: Create a new order from user's cart
      tags:
        - Orders
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - shippingAddress
              properties:
                shippingAddress:
                  $ref: '#/components/schemas/ShippingAddress'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Order created successfully."
                  order:
                    $ref: '#/components/schemas/Order'

  /api/orders/{id}:
    get:
      summary: Get order by ID
      description: Retrieve a specific order for the authenticated user
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Order ID
          schema:
            type: string
      responses:
        '200':
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /api/orders/admin/all:
    get:
      summary: Get all orders (Admin)
      description: Retrieve all orders in system (admin only)
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Number of orders per page
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: status
          in: query
          description: Filter by order status
          required: false
          schema:
            type: string
            enum: [pending, confirmed, shipped, delivered, cancelled]
      responses:
        '200':
          description: Orders retrieved successfully

  /api/orders/{id}/status:
    put:
      summary: Update order status (Admin)
      description: Update the status of an order (admin only)
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Order ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [pending, confirmed, shipped, delivered, cancelled]
                  example: "confirmed"
      responses:
        '200':
          description: Order status updated successfully

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: "60d5ecb74b24a1234567890a"
        email:
          type: string
          format: email
          example: "user@example.com"
        role:
          type: string
          enum: [admin, user]
          example: "user"

    Product:
      type: object
      properties:
        _id:
          type: string
          example: "60d5ecb74b24a1234567890b"
        name:
          type: string
          example: "MacBook Pro 14\""
        description:
          type: string
          example: "Apple MacBook Pro with M3 Pro chip, 18GB RAM, 512GB SSD"
        price:
          type: number
          example: 1999.99
        stockCount:
          type: integer
          example: 15
        images:
          type: array
          items:
            type: string
          example: ["https://example.com/macbook-pro-1.jpg"]
        category:
          $ref: '#/components/schemas/Category'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      required:
        - name
        - description
        - price
        - category
      properties:
        name:
          type: string
          example: "New Product"
        description:
          type: string
          example: "Product description"
        price:
          type: number
          minimum: 0
          example: 99.99
        stockCount:
          type: integer
          minimum: 0
          default: 0
          example: 50
        images:
          type: array
          items:
            type: string
          example: ["https://example.com/image.jpg"]
        category:
          type: string
          example: "60d5ecb74b24a1234567890c"

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          minimum: 0
        stockCount:
          type: integer
          minimum: 0
        images:
          type: array
          items:
            type: string
        category:
          type: string

    Category:
      type: object
      properties:
        _id:
          type: string
          example: "60d5ecb74b24a1234567890c"
        name:
          type: string
          example: "Laptops"
        slug:
          type: string
          example: "laptops"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CartItem:
      type: object
      properties:
        product:
          $ref: '#/components/schemas/Product'
        quantity:
          type: integer
          minimum: 1
          example: 2

    Cart:
      type: object
      properties:
        _id:
          type: string
          example: "60d5ecb74b24a1234567890d"
        user:
          type: string
          example: "60d5ecb74b24a1234567890a"
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderItem:
      type: object
      properties:
        product:
          $ref: '#/components/schemas/Product'
        quantity:
          type: integer
          minimum: 1
          example: 1
        price:
          type: number
          example: 1999.99

    ShippingAddress:
      type: object
      required:
        - street
        - city
        - zipCode
        - country
      properties:
        street:
          type: string
          example: "123 Main St"
        city:
          type: string
          example: "New York"
        state:
          type: string
          example: "NY"
        zipCode:
          type: string
          example: "10001"
        country:
          type: string
          example: "USA"

    Order:
      type: object
      properties:
        _id:
          type: string
          example: "60d5ecb74b24a1234567890e"
        user:
          type: string
          example: "60d5ecb74b24a1234567890a"
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalAmount:
          type: number
          example: 1999.99
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
          example: "pending"
        shippingAddress:
          $ref: '#/components/schemas/ShippingAddress'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        message:
          type: string
          example: "Error message description"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

tags:
  - name: Health
    description: API health check endpoints
  - name: Authentication
    description: User authentication and registration
  - name: Products
    description: Product management
  - name: Categories
    description: Category management
  - name: Cart
    description: Shopping cart operations
  - name: Orders
    description: Order management
